<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Programar NFC</title>

<style>

body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #111111;
    padding: 30px;
    margin: 0;
}


.card {

    background: #ffffff;
    max-width: 400px;
    margin: auto;
    padding: 30px 25px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,.35);

}


.logo {

    width: 150px;
    margin-bottom: 20px;

}


h2 {

    margin-top: 0;
    color: #111111;
    font-size: 24px;

}


.nombre {

    font-size: 25px;
    font-weight: bold;
    color: #111111;
    margin-top: 20px;

}


.id {

    margin-top: 10px;
    color: #555555;
    font-size: 18px;

}


button {

    margin-top: 30px;
    padding: 16px 35px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    background: #D4A017;
    color: #000000;
    cursor: pointer;
    box-shadow: 0 3px 8px rgba(0,0,0,.25);

}


button:active {

    transform: scale(.97);

}


.estado {

    margin-top: 25px;
    font-size: 18px;
    font-weight: bold;
    color: #111111;

}


</style>
</head>


<body>


<div class="card">

<img src="https://raw.githubusercontent.com/americordzn-karate/asistencia/main/Escudo%20Circulo%20PNG.png" class="logo">

<h2>
PROGRAMAR TARJETA NFC
</h2>


<div class="nombre" id="nombre">
</div>


<div class="id" id="idAlumno">
</div>


<button onclick="grabarNFC()">
PROGRAMAR TARJETA NFC
</button>


<div class="estado" id="estado">
Esperando...
</div>


</div>



<script>


// Obtener datos enviados desde AppSheet

const parametros = new URLSearchParams(window.location.search);


const idAlumno = parametros.get("id");

const nombre = parametros.get("nombre");



document.getElementById("nombre").innerHTML =
nombre || "Sin nombre";


document.getElementById("idAlumno").innerHTML =
"ID: " + idAlumno;



async function grabarNFC(){


    if(!("NDEFReader" in window)){


        document.getElementById("estado").innerHTML =
        "❌ Web NFC no disponible";


        return;

    }



    try{


        document.getElementById("estado").innerHTML =
        "📡 Acerque la tarjeta...";



        const ndef = new NDEFReader();



        await ndef.write({

            records:[

                {

                    recordType:"text",

                    data:idAlumno

                }

            ]

        });



        navigator.vibrate(200);



        document.getElementById("estado").innerHTML =
        "✅ Tarjeta programada";


    }


    catch(error){


        document.getElementById("estado").innerHTML =
        "❌ Error: " + error.message;


    }


}


</script>


</body>

</html>
